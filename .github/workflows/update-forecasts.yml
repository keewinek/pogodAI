name: Update PogodAI forecasts

on:
  schedule:
    # Co godzinę (UTC) — fallback gdy Cursor Automation nie działa
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run forecast updater
        env:
          POGODAI_API: https://pogodai.keewinek.deno.net
        run: deno run -A scripts/update-forecasts.ts

      - name: Verify health
        run: |
          curl -sf https://pogodai.keewinek.deno.net/api/health
          echo ""
